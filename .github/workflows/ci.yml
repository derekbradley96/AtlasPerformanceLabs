# CI: install, security (audit + OSV), lint, test. Fails on high/critical vulns.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: npm audit strict (fail on high)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test unit (Vitest)
        run: npm run test:unit

  osv-scan:
    name: OSV Scanner (lockfile)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3
    with:
      scan-args: |
        --lockfile=package-lock.json
      # Do not fail pipeline on vulns; track in Security tab. Re-enable when quill low-severity has a fix.
      fail-on-vuln: false
    permissions:
      actions: read
      security-events: write
      contents: read
