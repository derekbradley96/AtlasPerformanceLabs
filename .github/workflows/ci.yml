# CI: install, security (audit + OSV), lint, test. Fails on high/critical vulns.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: npm audit strict (fail on high)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: OSV Scanner (lockfile)
        run: |
          curl -sSfL -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --lockfile=package-lock.json
        continue-on-error: false

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test unit (Vitest)
        run: npm run test:unit
